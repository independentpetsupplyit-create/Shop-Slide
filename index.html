    var slideIndex = 0;
    carousel();
    
    function carousel() {
    var i;
    var x = document.getElementsByClassName("slideImages");
    for (i = 0; i < x.length; i++) {

    }
    slideIndex++;

    setTimeout(carousel, 5000);
