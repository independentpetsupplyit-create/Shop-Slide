<!DOCTYPE html>
<html>
<head>
<base target="_parent">
<style>
    .slider-viewport {
        position: relative;
        width: 100%;
        max-width: 1920px;
        margin: auto;
        overflow: hidden;
        border-radius: 8px;
    }

    .slider-track {
        display: flex;
        /* Animation is handled by JS now to allow for the "instant" jump */
        width: 100%;
    }

    .slide-item {
        min-width: 100%;
        box-sizing: border-box;
    }

    .slide-item img {
        width: 100%;
        display: block;
        height: auto;
    }

    .nav-btn {
        position: absolute;
        top: 50%;
        transform: translateY(-50%);
        background: rgba(0, 0, 0, 0.4);
        color: white;
        border: none;
        padding: 15px 10px;
        cursor: pointer;
        font-size: 20px;
        z-index: 10;
    }

    .prev { left: 0; border-radius: 0 5px 5px 0; }
    .next { right: 0; border-radius: 5px 0 0 5px; }
</style>
</head>
<body>

<div class="slider-viewport">
    <div class="slider-track" id="mainTrack">
        <div class="slide-item"><a href="link1"><img src="https://shop.independentpetsupply.com/documents/d/shop/march400"></a></div>
        <div class="slide-item"><a href="link2"><img src="https://shop.independentpetsupply.com/documents/d/shop/flea-tick400"></a></div>
        <div class="slide-item"><a href="link3"><img src="https://shop.independentpetsupply.com/documents/d/shop/frommnutritionals"></a></div>
        <div class="slide-item"><a href="link4"><img src="https://shop.independentpetsupply.com/documents/d/shop/what-sbarking400"></a></div>
        <div class="slide-item"><a href="link5"><img src="https://shop.independentpetsupply.com/documents/d/shop/saintrocco-s400"></a></div>
        <div class="slide-item"><a href="link6"><img src="https://shop.independentpetsupply.com/documents/d/shop/getjoy400green"></a></div>
        <div class="slide-item"><a href="link7"><img src="https://shop.independentpetsupply.com/documents/d/shop/heavenlyhounds400"></a></div>
        <div class="slide-item"><a href="link8"><img src="https://shop.independentpetsupply.com/documents/d/shop/wildridge400"></a></div>
    </div>

    <button class="nav-btn prev" onclick="changeSlide(-1)">&#10094;</button>
    <button class="nav-btn next" onclick="changeSlide(1)">&#10095;</button>
</div>

<script>
    const track = document.getElementById("mainTrack");
    const slides = document.querySelectorAll(".slide-item");
    
    // 1. Clone the first and last slides
    const firstClone = slides[0].cloneNode(true);
    const lastClone = slides[slides.length - 1].cloneNode(true);

    // 2. Add them to the track
    track.appendChild(firstClone);
    track.insertBefore(lastClone, slides[0]);

    // 3. Set starting position (offset by 1 because of the clone at the start)
    let index = 1;
    let isTransitioning = false;
    track.style.transform = `translateX(-${index * 100}%)`;

    function updateSlider(animate = true) {
        if (animate) {
            track.style.transition = "transform 0.6s ease-in-out";
        } else {
            track.style.transition = "none";
        }
        track.style.transform = `translateX(-${index * 100}%)`;
    }

    function changeSlide(n) {
        if (isTransitioning) return; // Prevent clicking too fast
        isTransitioning = true;
        index += n;
        updateSlider(true);
    }

    // This event listens for the end of the sliding animation
    track.addEventListener('transitionend', () => {
        isTransitioning = false;
        
        // If we are on the "fake" last slide, jump back to the real first one
        if (index >= slides.length + 1) {
            index = 1;
            updateSlider(false);
        }
        // If we are on the "fake" first slide, jump to the real last one
        if (index <= 0) {
            index = slides.length;
            updateSlider(false);
        }
    });

    // Auto-play
    setInterval(() => {
        if (!isTransitioning) {
            changeSlide(1);
        }
    }, 5000);
</script>

</body>
</html>
