<!DOCTYPE html>
<html>
<head>
    <base target="_parent">
    <style>
        body { margin: 0; padding: 0; background: transparent; }
        
        .slider-viewport {
            position: relative;
            width: 100%;
            max-width: 1920px;
            /* Use aspect-ratio to keep it 1920/400 regardless of width */
            aspect-ratio: 1920 / 400; 
            max-height: 400px;
            margin: 0 auto;
            overflow: hidden;
        }

        .slide-item {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.6s ease-in-out;
            z-index: 1;
        }

        .slide-item.active {
            opacity: 1;
            visibility: visible;
            z-index: 2;
        }

        .slide-item img {
            width: 100%;
            height: 100%;
            /* 'contain' ensures the WHOLE image is always visible inside the box */
            /* 'cover' fills the box (might crop slightly) */
            object-fit: contain; 
            display: block;
        }

        /* Navigation Buttons */
        .nav-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(0, 0, 0, 0.5);
            color: white;
            border: none;
            padding: 1.5vw 1vw; /* Responsive padding based on viewport width */
            cursor: pointer;
            z-index: 10;
            font-size: 2vw; /* Arrow size scales with the slider */
            min-font-size: 18px;
            transition: opacity 0.3s ease;
            opacity: 0;
        }

        .slider-viewport:hover .nav-btn {
            opacity: 1;
        }

        .prev { left: 0; border-radius: 0 5px 5px 0; }
        .next { right: 0; border-radius: 5px 0 0 5px; }
    </style>
</head>
<body>

<!--Current Slides-->

<div class="slider-viewport">
    <!--Woodies-->
    <div class="slide-item active"><a href="https://shop.independentpetsupply.com/shop/-/o/category/668B75C4-FE4C-4B06-8DDF-2D3F4A2E1A54%7CD440B87E-2884-4655-9B61-8F553403195B%7C79C1739A-8B31-440D-9CF7-AD1F619FD53E/cn/Healthy-Pet-World" target="_blank">
    <img src="https://shop.independentpetsupply.com/documents/d/shop/healthypetworld400"></a></div>

    <!--Grandma Mae's-->
    <div class="slide-item"><a href="https://shop.independentpetsupply.com/shop/-/o/category/668B75C4-FE4C-4B06-8DDF-2D3F4A2E1A54%7CEF6EFE12-8866-43B6-BC8D-08046E9D0091%7CFBE63077-2CB6-4E09-BCDD-DBDB41C240F7/cn/Grandma-Mae-s">
    <img src="https://shop.independentpetsupply.com/documents/d/shop/grandmamaes400"></a></div>

    <!--Lotus-->
    <div class="slide-item"><a href="https://shop.independentpetsupply.com/shop/-/o/category/668B75C4-FE4C-4B06-8DDF-2D3F4A2E1A54%7CAB058948-B28B-43F0-8A5E-FC2C505AE121%7CFD011812-01CF-41E1-A8FB-2D74DE3FFF32/cn/Lotus" target="_blank">
    <img alt="" class="slideImages imageSlide" src="https://shop.independentpetsupply.com/documents/d/shop/lotus400" /></a></div>
    
    <!--Timberwolf-->
    <div class="slide-item"><a href="https://shop.independentpetsupply.com/shop/-/o/category/668B75C4-FE4C-4B06-8DDF-2D3F4A2E1A54%7CE55BDB11-A890-49E8-894A-1EA73D6F1058%7C369935CC-6A6A-4D68-BA71-C912E14C26BA/cn/Timberwolf" target="_blank">
    <img alt="" class="slideImages imageSlide" src="https://shop.independentpetsupply.com/documents/d/shop/timberwolfcentered400" /></a></div>
    
    <button class="nav-btn prev" onclick="changeSlide(-1)">&#10094;</button>
    <button class="nav-btn next" onclick="changeSlide(1)">&#10095;</button>
</div>

<script>
    let currentIndex = 0;
    const slides = document.querySelectorAll('.slide-item');

    function changeSlide(direction) {
        slides[currentIndex].classList.remove('active');
        currentIndex = (currentIndex + direction + slides.length) % slides.length;
        slides[currentIndex].classList.add('active');
    }

    let autoPlay = setInterval(() => changeSlide(1), 5000);

    function handleManualNav(direction) {
        clearInterval(autoPlay);
        changeSlide(direction);
        autoPlay = setInterval(() => changeSlide(1), 5000);
    }

    document.querySelector('.prev').onclick = () => handleManualNav(-1);
    document.querySelector('.next').onclick = () => handleManualNav(1);
</script>

</body>
</html>
