<!DOCTYPE html>
<html>
<head>
<style>
    /* Main wrapper to clip the sliding images */
    .slider-viewport {
        position: relative;
        width: 100%;
        max-width: 800px; /* Adjust to your preferred width */
        margin: auto;
        overflow: hidden;
        border-radius: 8px;
    }

    /* The actual moving row of images */
    .slider-track {
        display: flex;
        transition: transform 0.6s cubic-bezier(0.45, 0, 0.55, 1);
        width: 100%;
    }

    /* Each slide takes up 100% of the viewport width */
    .slide-item {
        min-width: 100%;
        box-sizing: border-box;
    }

    .slide-item img {
        width: 100%;
        display: block;
        height: auto;
    }

    /* Navigation Buttons */
    .nav-btn {
        position: absolute;
        top: 50%;
        transform: translateY(-50%);
        background: rgba(0, 0, 0, 0.4);
        color: white;
        border: none;
        padding: 15px 10px;
        cursor: pointer;
        font-size: 20px;
        z-index: 10;
        transition: background 0.3s;
    }

    .nav-btn:hover {
        background: rgba(0, 0, 0, 0.8);
    }

    .prev { left: 0; border-radius: 0 5px 5px 0; }
    .next { right: 0; border-radius: 5px 0 0 5px; }
</style>
</head>
<body>

<div class="slider-viewport">
    <div class="slider-track" id="mainTrack">
        <div class="slide-item">
            <a href="https://shop.independentpetsupply.com/monthly-promotions" target="_blank">

                <img src="https://shop.independentpetsupply.com/documents/d/shop/flea-tick400" alt="Flea and Tick" />
            </a>
        </div>

        <div class="slide-item">

        </div>

        <div class="slide-item">
            <a href="https://shop.independentpetsupply.com/shop/-/o/category/668B75C4-FE4C-4B06-8DDF-2D3F4A2E1A54%7C1F146803-9247-408E-929D-DB41FAEA1FE6%7C773D1521-8A63-4E71-B841-3EFF6646F8F6/cn/Saint-Rocco-s">

    </div>

    <button class="nav-btn prev" onclick="changeSlide(-1)">&#10094;</button>
    <button class="nav-btn next" onclick="changeSlide(1)">&#10095;</button>
</div>

<script>
    var slideIndex = 0;
    var slides = document.querySelectorAll(".slide-item");
    var track = document.getElementById("mainTrack");
    var autoSlideTimeout;

    function updateSlider() {
        // Move the track by the current index percentage
        var offset = -slideIndex * 100;
        track.style.transform = "translateX(" + offset + "%)";
        
        // Reset the timer whenever the slide changes (manual or auto)
        clearTimeout(autoSlideTimeout);
        autoSlideTimeout = setTimeout(autoCarousel, 5000);
    }

    function changeSlide(n) {
        slideIndex += n;
        if (slideIndex >= slides.length) { slideIndex = 0; }
        if (slideIndex < 0) { slideIndex = slides.length - 1; }
        updateSlider();
    }

    function autoCarousel() {
        slideIndex++;
        if (slideIndex >= slides.length) { slideIndex = 0; }
        updateSlider();
    }

    // Start the timer for the first time
    autoSlideTimeout = setTimeout(autoCarousel, 5000);
</script>

</body>
</html>
