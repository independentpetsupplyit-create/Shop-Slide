<!DOCTYPE html>
<html>
<head>
<base target="_parent">
<style>
    body { margin: 0; padding: 0; background: #fff; }
    
    .slider-viewport {
        position: relative;
        width: 100%;
        max-width: 800px;
        margin: 20px auto;
        overflow: hidden; /* This hides the 'peek' */
        border-radius: 8px;
    }

    .slider-track {
        display: flex;
        width: 100%;
        transition: transform 0.5s ease-in-out;
        /* Ensure no gaps between slides */
        margin: 0;
        padding: 0;
    }

    .slide-item {
        /* This is the fix: Force it to be exactly the width of the container */
        min-width: 100%;
        width: 100%;
        flex-shrink: 0;
        margin: 0;
        padding: 0;
    }

    .slide-item img {
        width: 100%;
        display: block;
        height: auto;
        border: none;
    }

    /* Navigation Buttons */
    .nav-btn {
        position: absolute;
        top: 50%;
        transform: translateY(-50%);
        background: rgba(0, 0, 0, 0.4);
        color: white;
        border: none;
        padding: 15px 12px;
        cursor: pointer;
        z-index: 10;
        font-size: 24px;
        line-height: 1;
    }

    .prev { left: 0; border-radius: 0 4px 4px 0; }
    .next { right: 0; border-radius: 4px 0 0 4px; }
</style>
</head>
<body>

<div class="slider-viewport">
    <div class="slider-track" id="mainTrack">
        </div>

    <button class="nav-btn prev" id="prevBtn">&#10094;</button>
    <button class="nav-btn next" id="nextBtn">&#10095;</button>
</div>

<script>
    const track = document.getElementById('mainTrack');
    
    const slideData = [
        { link: "https://shop.independentpetsupply.com/monthly-promotions", img: "https://shop.independentpetsupply.com/documents/d/shop/march400" },
        { link: "https://shop.independentpetsupply.com/shop/-/o/refined-search/food%3A85279b9269c52e64beaa9a63ddbfe64c492cf9c9c68b290497665c8311bfea4c", img: "https://shop.independentpetsupply.com/documents/d/shop/flea-tick400" },
        { link: "https://shop.independentpetsupply.com/shop/-/o/brand-filter/a630c222c37ffc501bbf9e4ffee0ada09929a6f60dc98abeb4d8496210119463", img: "https://shop.independentpetsupply.com/documents/d/shop/frommnutritionals" },
        { link: "https://shop.independentpetsupply.com/shop/-/o/category/668B75C4-FE4C-4B06-8DDF-2D3F4A2E1A54%7C34CD420F-6354-4BA2-B6B8-3C045B0E1E52%7CD13E9DFD-F790-497A-B2ED-F3E603C05641/cn/What-s-Barking", img: "https://shop.independentpetsupply.com/documents/d/shop/what-sbarking400" },
        { link: "https://shop.independentpetsupply.com/shop/-/o/category/668B75C4-FE4C-4B06-8DDF-2D3F4A2E1A54%7C1F146803-9247-408E-929D-DB41FAEA1FE6%7C773D1521-8A63-4E71-B841-3EFF6646F8F6/cn/Saint-Rocco-s", img: "https://shop.independentpetsupply.com/documents/d/shop/saintrocco-s400" },
        { link: "https://shop.independentpetsupply.com/shop/-/o/category/668B75C4-FE4C-4B06-8DDF-2D3F4A2E1A54%7CEF6EFE12-8866-43B6-BC8D-08046E9D0091%7C7B9AA37C-CBCE-4EDC-ACCC-D14A342B0E5B/cn/Get-Joy", img: "https://shop.independentpetsupply.com/documents/d/shop/getjoy400green" },
        { link: "https://shop.independentpetsupply.com/documents/d/shop/heavenly_hounds_iso_2026", img: "https://shop.independentpetsupply.com/documents/d/shop/heavenlyhounds400" },
        { link: "https://shop.independentpetsupply.com/documents/d/shop/wildridge_iso_2026", img: "https://shop.independentpetsupply.com/documents/d/shop/wildridge400" }
    ];

    // Clone data for infinite effect
    const firstItem = slideData[0];
    const lastItem = slideData[slideData.length - 1];
    const extendedData = [lastItem, ...slideData, firstItem];

    // Create Slides
    track.innerHTML = extendedData.map(item => `
        <div class="slide-item">
            <a href="${item.link}"><img src="${item.img}"></a>
        </div>
    `).join('');

    let index = 1; 
    let isMoving = false;

    // Initial setup (Start at the real first slide)
    track.style.transition = 'none';
    track.style.transform = `translateX(-100%)`;

    function moveSlider(direction) {
        if (isMoving) return;
        isMoving = true;
        index += direction;
        track.style.transition = 'transform 0.5s ease-in-out';
        track.style.transform = `translateX(-${index * 100}%)`;
    }

    // This handles the seamless jump back/forth
    track.addEventListener('transitionend', () => {
        isMoving = false;
        
        // At the 'fake' last slide, jump to real first
        if (index >= extendedData.length - 1) {
            track.style.transition = 'none';
            index = 1;
            track.style.transform = `translateX(-100%)`;
        }
        
        // At the 'fake' first slide, jump to real last
        if (index <= 0) {
            track.style.transition = 'none';
            index = extendedData.length - 2;
            track.style.transform = `translateX(-${index * 100}%)`;
        }
    });

    document.getElementById('nextBtn').addEventListener('click', () => moveSlider(1));
    document.getElementById('prevBtn').addEventListener('click', () => moveSlider(-1));

    // Auto-advance
    setInterval(() => moveSlider(1), 5000);

</script>
</body>
</html>
