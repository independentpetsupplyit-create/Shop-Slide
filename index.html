<!DOCTYPE html>
<html>
<head>
    <base target="_parent">
    <style>
        body { margin: 0; padding: 0; background: transparent; }
        
        .slider-viewport {
            position: relative;
            width: 100%;
            max-width: 1920px;
            /* Use aspect-ratio to keep it 1920/400 regardless of width */
            aspect-ratio: 1920 / 400; 
            max-height: 400px;
            margin: 0 auto;
            overflow: hidden;
        }

        .slide-item {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.6s ease-in-out;
            z-index: 1;
        }

        .slide-item.active {
            opacity: 1;
            visibility: visible;
            z-index: 2;
        }

        .slide-item img {
            width: 100%;
            height: 100%;
            /* 'contain' ensures the WHOLE image is always visible inside the box */
            /* 'cover' fills the box (might crop slightly) */
            object-fit: contain; 
            display: block;
        }

        /* Navigation Buttons */
        .nav-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(0, 0, 0, 0.5);
            color: white;
            border: none;
            padding: 1.5vw 1vw; /* Responsive padding based on viewport width */
            cursor: pointer;
            z-index: 10;
            font-size: 2vw; /* Arrow size scales with the slider */
            min-font-size: 18px;
            transition: opacity 0.3s ease;
            opacity: 0;
        }

        .slider-viewport:hover .nav-btn {
            opacity: 1;
        }

        .prev { left: 0; border-radius: 0 5px 5px 0; }
        .next { right: 0; border-radius: 5px 0 0 5px; }
    </style>
</head>
<body>

<div class="slider-viewport">
    <div class="slide-item active"><a href="https://shop.independentpetsupply.com/monthly-promotions"><img src="https://shop.independentpetsupply.com/documents/d/shop/march400"></a></div>
    <div class="slide-item"><a href="https://shop.independentpetsupply.com/shop/-/o/refined-search/food%3A85279b9269c52e64beaa9a63ddbfe64c492cf9c9c68b290497665c8311bfea4c"><img src="https://shop.independentpetsupply.com/documents/d/shop/flea-tick400"></a></div>
    <div class="slide-item"><a href="https://shop.independentpetsupply.com/shop/-/o/brand-filter/a630c222c37ffc501bbf9e4ffee0ada09929a6f60dc98abeb4d8496210119463"><img src="https://shop.independentpetsupply.com/documents/d/shop/frommnutritionals"></a></div>
    <div class="slide-item"><a href="https://shop.independentpetsupply.com/shop/-/o/category/668B75C4-FE4C-4B06-8DDF-2D3F4A2E1A54%7C34CD420F-6354-4BA2-B6B8-3C045B0E1E52%7CD13E9DFD-F790-497A-B2ED-F3E603C05641/cn/What-s-Barking"><img src="https://shop.independentpetsupply.com/documents/d/shop/what-sbarking400"></a></div>
    <div class="slide-item"><a href="https://shop.independentpetsupply.com/shop/-/o/category/668B75C4-FE4C-4B06-8DDF-2D3F4A2E1A54%7C1F146803-9247-408E-929D-DB41FAEA1FE6%7C773D1521-8A63-4E71-B841-3EFF6646F8F6/cn/Saint-Rocco-s"><img src="https://shop.independentpetsupply.com/documents/d/shop/saintrocco-s400"></a></div>
    <div class="slide-item"><a href="https://shop.independentpetsupply.com/shop/-/o/category/668B75C4-FE4C-4B06-8DDF-2D3F4A2E1A54%7CEF6EFE12-8866-43B6-BC8D-08046E9D0091%7C7B9AA37C-CBCE-4EDC-ACCC-D14A342B0E5B/cn/Get-Joy"><img src="https://shop.independentpetsupply.com/documents/d/shop/getjoy400green"></a></div>
    <div class="slide-item"><a href="https://shop.independentpetsupply.com/documents/d/shop/heavenly_hounds_iso_2026" target="_blank"><img src="https://shop.independentpetsupply.com/documents/d/shop/heavenlyhounds400"></a></div>
    <div class="slide-item"><a href="https://shop.independentpetsupply.com/documents/d/shop/wildridge_iso_2026" target="_blank"><img src="https://shop.independentpetsupply.com/documents/d/shop/wildridge400"></a></div>

    <button class="nav-btn prev" onclick="changeSlide(-1)">&#10094;</button>
    <button class="nav-btn next" onclick="changeSlide(1)">&#10095;</button>
</div>

<script>
    let currentIndex = 0;
    const slides = document.querySelectorAll('.slide-item');

    function changeSlide(direction) {
        slides[currentIndex].classList.remove('active');
        currentIndex = (currentIndex + direction + slides.length) % slides.length;
        slides[currentIndex].classList.add('active');
    }

    let autoPlay = setInterval(() => changeSlide(1), 5000);

    function handleManualNav(direction) {
        clearInterval(autoPlay);
        changeSlide(direction);
        autoPlay = setInterval(() => changeSlide(1), 5000);
    }

    document.querySelector('.prev').onclick = () => handleManualNav(-1);
    document.querySelector('.next').onclick = () => handleManualNav(1);
</script>

</body>
</html>
